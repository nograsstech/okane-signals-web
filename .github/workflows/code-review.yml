name: AI Code Review with Z.ai

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  review:
    name: Review
    runs-on: ubuntu-latest
    steps:
      - name: Code Review
        uses: tarmojussila/zai-code-review@v0.3.0
        with:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}